django = "^3.2"
django-allauth = "~0.51.0"
django-anymail = "^8.6"
django-cachalot = "~2.5.1"
django-compressor = "~4.1"
django-js-asset = "~2.0.0"
django-mptt = "~0.13.4"
django-redis = "~5.2.0"
django-rest-auth = "~0.9.5"
djangorestframework = "~3.13.1"
drf-nested-routers = "~0.93.4"
elasticsearch = "~8.3.3"
factory-boy = "^3.2.1"
faker = "^14.1.0"
fastcache = "^1.1.0"
# gensim = "~4.2.0"
isbnlib = "^3.10.10"
lz4 = "~4.0.2"
nltk = "^3.7"
oaiharvest = "~3.0.0"
psycopg2-binary = "~2.9.3"
pyfakefs = "^4.6.3"
pymarc = "~4.2.0"
